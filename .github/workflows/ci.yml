name: Build and Containerize

on:
  push:
    branches: [ "main" ]

jobs:
  test-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run a greeting
        run: echo "Code pushed to main. Starting CI process..."
  
  containerize:
    runs-on: ubuntu-latest
    needs: test-job # This ensures it only runs if the first job passes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build -t my-app:latest .
          echo "Docker image built successfully!"